<div class="fixed top-4 right-4 z-50 space-y-3">

  @for (toast of (toasts$ | async); track toast.id) {

    <div
      class="min-w-[250px] max-w-sm px-4 py-3 rounded-lg shadow-lg text-sm text-white flex justify-between items-center animate-slide-in"
      [ngClass]="{
        'bg-green-500': toast.type === 'success',
        'bg-red-500': toast.type === 'error',
        'bg-blue-500': toast.type === 'info',
        'bg-yellow-500 text-black': toast.type === 'warning'
      }"
    >

      <span>{{ toast.message }}</span>

      <button
        (click)="remove(toast.id)"
        class="ml-4 text-lg leading-none"
      >
        ✕
      </button>

    </div>

  }

</div>
